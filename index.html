<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Expense Tracker</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2>Expense Entry</h2>

<input type="date" id="date">

<input type="text" id="month" placeholder="Month">

<input type="text" id="description" placeholder="Description">


<label>Category</label>

<div class="button-group">

<button onclick="selectButton(this,'category')">Transport</button>
<button onclick="selectButton(this,'category')">Groceries</button>
<button onclick="selectButton(this,'category')">Utilities</button>
<button onclick="selectButton(this,'category')">Recharge</button>
<button onclick="selectButton(this,'category')">Health</button>

</div>

<input type="hidden" id="category">


<label>Sub Category</label>

<input type="text" id="subcategory">


<label>Merchant</label>

<div class="button-group">

<button onclick="selectButton(this,'merchant')">BEST</button>
<button onclick="selectButton(this,'merchant')">DMart</button>
<button onclick="selectButton(this,'merchant')">Jio</button>
<button onclick="selectButton(this,'merchant')">Gym</button>
<button onclick="selectButton(this,'merchant')">Other</button>

</div>

<input type="hidden" id="merchant">


<label>Payment Mode</label>

<div class="button-group">

<button onclick="selectButton(this,'paymentmode')">UPI</button>
<button onclick="selectButton(this,'paymentmode')">Cash</button>

</div>

<input type="hidden" id="paymentmode">


<label>Source</label>

<input type="text" id="source" placeholder="Salary / Cash / Account">


<label>Frequency</label>

<div class="button-group">

<button onclick="selectButton(this,'frequency')">One-Time</button>
<button onclick="selectButton(this,'frequency')">Weekly</button>
<button onclick="selectButton(this,'frequency')">Monthly</button>
<button onclick="selectButton(this,'frequency')">Yearly</button>

</div>

<input type="hidden" id="frequency">


<label>Fixed / Variable</label>

<div class="button-group">

<button onclick="selectButton(this,'fixedvariable')">Fixed</button>
<button onclick="selectButton(this,'fixedvariable')">Variable</button>

</div>

<input type="hidden" id="fixedvariable">


<label>Need / Want</label>

<div class="button-group">

<button onclick="selectButton(this,'needwant')">Need</button>
<button onclick="selectButton(this,'needwant')">Want</button>

</div>

<input type="hidden" id="needwant">


<input type="number" id="amount" placeholder="Amount">

<input type="text" id="tags" placeholder="Tags">


<button class="submit-btn" onclick="submitData()">Add Expense</button>

</div>

<script src="script.js"></script>

</body>

</html>

</div>
