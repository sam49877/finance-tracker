<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2>Expense Entry</h2>

<input type="date" id="date">

<input type="text" id="description" placeholder="Description">

<label>Category</label>

<div class="button-group">

<button onclick="selectButton(this,'category')">Dairy</button>
<button onclick="selectButton(this,'category')">Breakfast</button>
<button onclick="selectButton(this,'category')">Beverages</button>
<button onclick="selectButton(this,'category')">Food</button>
<button onclick="selectButton(this,'category')">Travel</button>
<button onclick="selectButton(this,'category')">Utilities</button>
<button onclick="selectButton(this,'category')">Mobile</button>
<button onclick="selectButton(this,'category')">Health</button>
<button onclick="selectButton(this,'category')">Pets</button>
<button onclick="selectButton(this,'category')">Snacks</button>
<button onclick="selectButton(this,'category')">Misc</button>

</div>

<input type="hidden" id="category">


<label>Sub Category (type product)</label>

<input type="text" id="subcategory" placeholder="Example: Amul Kool, Oats, BEST Recharge">


<label>Merchant</label>

<div class="button-group">

<button onclick="selectButton(this,'merchant')">DMart</button>
<button onclick="selectButton(this,'merchant')">Local Shop</button>
<button onclick="selectButton(this,'merchant')">Amazon</button>
<button onclick="selectButton(this,'merchant')">BEST</button>
<button onclick="selectButton(this,'merchant')">Auto</button>
<button onclick="selectButton(this,'merchant')">Medical Store</button>
<button onclick="selectButton(this,'merchant')">Other</button>

</div>

<input type="hidden" id="merchant">


<label>Payment Mode</label>

<div class="button-group">

<button onclick="selectButton(this,'paymentmode')">UPI</button>
<button onclick="selectButton(this,'paymentmode')">Cash</button>

</div>

<input type="hidden" id="paymentmode">


<label>Frequency</label>

<div class="button-group">

<button onclick="selectButton(this,'frequency')">One-Time</button>
<button onclick="selectButton(this,'frequency')">Weekly</button>
<button onclick="selectButton(this,'frequency')">Monthly</button>

</div>

<input type="hidden" id="frequency">


<label>Fixed / Variable</label>

<div class="button-group">

<button onclick="selectButton(this,'fixedvariable')">Fixed</button>
<button onclick="selectButton(this,'fixedvariable')">Variable</button>

</div>

<input type="hidden" id="fixedvariable">


<label>Need / Want</label>

<div class="button-group">

<button onclick="selectButton(this,'needwant')">Need</button>
<button onclick="selectButton(this,'needwant')">Want</button>

</div>

<input type="hidden" id="needwant">


<input type="number" id="amount" placeholder="Amount">

<input type="text" id="tags" placeholder="Notes / Tags">

<button class="submit-btn" onclick="submitData()">Add Expense</button>

</div>

<script src="script.js"></script>

</body>

</html>
