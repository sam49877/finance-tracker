<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>Finance Entry</h2>

    <form id="financeForm">

      <input type="date" id="date" required />

      <!-- TYPE -->
      <div class="toggle-container">
        <label>Type</label>
        <div class="toggle-group" data-target="type">
          <button type="button" class="toggle-btn" data-value="Expense">Expense</button>
          <button type="button" class="toggle-btn" data-value="Income">Income</button>
        </div>
      </div>
      <input type="hidden" id="type" required>

      <input type="text" id="category" placeholder="Category" required />
      <input type="text" id="subCategory" placeholder="Sub-Category" />
      <input type="text" id="description" placeholder="Description" />

      <!-- PAYMENT MODE -->
      <div class="toggle-container">
        <label>Payment Mode</label>
        <div class="toggle-group" data-target="paymentMode">
          <button type="button" class="toggle-btn" data-value="UPI">UPI</button>
          <button type="button" class="toggle-btn" data-value="Cash">Cash</button>
        </div>
      </div>
      <input type="hidden" id="paymentMode" required>

      <!-- FIXED / VARIABLE -->
      <div class="toggle-container">
        <label>Fixed / Variable</label>
        <div class="toggle-group" data-target="fixedVariable">
          <button type="button" class="toggle-btn" data-value="Fixed">Fixed</button>
          <button type="button" class="toggle-btn" data-value="Variable">Variable</button>
        </div>
      </div>
      <input type="hidden" id="fixedVariable">

      <!-- NEED / WANT -->
      <div class="toggle-container">
        <label>Need / Want</label>
        <div class="toggle-group" data-target="needWant">
          <button type="button" class="toggle-btn" data-value="Need">Need</button>
          <button type="button" class="toggle-btn" data-value="Want">Want</button>
        </div>
      </div>
      <input type="hidden" id="needWant">

      <input type="number" id="amount" placeholder="Amount" required min="0" />
      <input type="text" id="tags" placeholder="Tags (comma separated)" />

      <button type="submit" id="submitBtn">Add Entry</button>

      <p id="message"></p>

    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
