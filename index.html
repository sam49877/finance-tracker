<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>Finance Entry</h2>

    <form id="financeForm">

      <input type="date" id="date" required />

      <select id="type" required>
        <option value="">Select Type</option>
        <option value="Expense">Expense</option>
        <option value="Income">Income</option>
      </select>

      <input type="text" id="category" placeholder="Category" required />
      <input type="text" id="subCategory" placeholder="Sub-Category" />
      <input type="text" id="description" placeholder="Description" />

      <!-- Updated Payment Mode Dropdown -->
      <select id="paymentMode" required>
        <option value="">Select Payment Mode</option>
        <option value="UPI">UPI</option>
        <option value="Cash">Cash</option>
      </select>

      <select id="fixedVariable">
        <option value="">Fixed/Variable</option>
        <option value="Fixed">Fixed</option>
        <option value="Variable">Variable</option>
      </select>

      <select id="needWant">
        <option value="">Need/Want</option>
        <option value="Need">Need</option>
        <option value="Want">Want</option>
      </select>

      <input type="number" id="amount" placeholder="Amount" required min="0" />
      <input type="text" id="tags" placeholder="Tags (comma separated)" />

      <button type="submit">Add Entry</button>

      <p id="message"></p>

    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
